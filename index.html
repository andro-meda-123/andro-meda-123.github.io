<!DOCTYPE html>
<html>
<head>
    <title>Amenity Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
            width: 100%;
        }
        .red-marker {
            background: red;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid black;
            box-shadow: 0 0 2px white;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const amenity = params.get('amenity') || 'cafe';
        const lat = parseFloat(params.get('lat'));
        const lon = parseFloat(params.get('lon'));
        const radius = parseInt(params.get('radius')) || 1000;

        // Initialize map
        const map = L.map('map').setView([lat, lon], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Add user's location marker (blue)
        L.marker([lat, lon]).addTo(map)
            .bindPopup('Your Location')
            .openPopup();

        // Custom red icon for amenities
        const redIcon = L.divIcon({
            className: 'red-marker',
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });

        // Fetch nearby amenities from Overpass API
        const overpassQuery = `[out:json];node["amenity"="${amenity}"](around:${radius},${lat},${lon});out;`;
        const overpassUrl = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(element => {
                    if (element.lat && element.lon) {
                        const marker = L.marker([element.lat, element.lon], { icon: redIcon }).addTo(map);
                        const name = element.tags?.name || 'Unnamed Amenity';
                        marker.bindPopup(`<b>${name}</b><br>${amenity}`);
                    }
                });
            })
            .catch(error => {
                console.error('Error fetching amenities:', error);
                alert('Failed to load amenities data.');
            });
    </script>
</body>
</html>
