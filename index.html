<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Amenities</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amenity = urlParams.get('amenity');
        const lat = parseFloat(urlParams.get('lat'));
        const lon = parseFloat(urlParams.get('lon'));
        const radius = parseInt(urlParams.get('radius'));

        const map = L.map('map').setView([lat, lon], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Custom marker icons using Leaflet's DivIcon
        const createMarkerIcon = (color) => L.divIcon({
            className: 'custom-icon',
            html: `<div style="background-color: ${color}; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff;"></div>`,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // Blue marker for reference location
        L.marker([lat, lon], { icon: createMarkerIcon('#20209F') })
            .addTo(map)
            .bindPopup("<b>Reference Location</b>").openPopup();

        // Fetch amenities from Overpass API
        const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="${amenity}"](around:${radius},${lat},${lon});out;`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                if (data.elements.length === 0) {
                    alert(`No amenities found for "${amenity}" within ${radius} meters.`);
                    return;
                }

                data.elements.forEach(element => {
                    const { lat, lon, tags } = element;
                    L.marker([lat, lon], { icon: createMarkerIcon('#008000') })
                        .addTo(map)
                        .bindPopup(`<b>${tags.name || "Unnamed Location"}</b>`);
                });

                const bounds = data.elements.map(element => [element.lat, element.lon]);
                bounds.push([lat, lon]);
                map.fitBounds(bounds);
            })
            .catch(err => {
                console.error('Error fetching data:', err);
                alert("Error fetching data from Overpass API. Please try again later.");
            });
    </script>
</body>
</html>
