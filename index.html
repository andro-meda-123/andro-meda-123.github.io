<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Amenities</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amenity = urlParams.get('amenity') || 'cafe';
        const lat = parseFloat(urlParams.get('lat')) || 51.505;
        const lon = parseFloat(urlParams.get('lon')) || -0.09;
        const radius = parseInt(urlParams.get('radius')) || 500;

        const map = L.map('map').setView([lat, lon], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Blue marker for user's location
        L.marker([lat, lon], { title: "Your Location" }).addTo(map)
            .bindPopup("You are here").openPopup();

        // Fetch amenities from Overpass API
        const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node[\"amenity\"=\"${amenity}\"](around:${radius},${lat},${lon});out;`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                if (data.elements.length === 0) {
                    alert(`No amenities found for "${amenity}" within ${radius} meters.`);
                    return;
                }

                data.elements.forEach(element => {
                    const { lat, lon, tags } = element;
                    const amenityName = tags && tags.name ? tags.name : "Unnamed Location";

                    L.marker([lat, lon], { icon: L.icon({
                        iconUrl: 'https://unpkg.com/leaflet/dist/images/marker-icon-red.png',
                        shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
                        iconAnchor: [12, 41] 
                    }) }).addTo(map)
                    .bindPopup(`${amenityName} (${amenity})`);
                });
            })
            .catch(err => {
                console.error('Error fetching data:', err);
                alert("Error fetching data from Overpass API. Please try again later.");
            });
    </script>
</body>
</html>
