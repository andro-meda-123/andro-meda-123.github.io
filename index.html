<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Amenities</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amenity = urlParams.get('amenity');
        const lat = parseFloat(urlParams.get('lat'));
        const lon = parseFloat(urlParams.get('lon'));
        const radius = parseInt(urlParams.get('radius'));

        const map = L.map('map').setView([lat, lon], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        const bounds = L.latLngBounds();

        const createCircleMarker = (color) => ({
            radius: 10,
            fillColor: color,
            color: "#ffffff",
            weight: 2,
            opacity: 1,
            fillOpacity: 1
        });

        L.circleMarker([lat, lon], createCircleMarker('#20209F'))
            .addTo(map)
            .bindPopup("<b>Reference Location</b>")
            .openPopup();

        bounds.extend([lat, lon]);

        const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="${amenity}"](around:${radius},${lat},${lon});out;`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(element => {
                    const { lat, lon, tags } = element;
                    const amenityName = tags.name || "Unnamed";
                    const address = tags["addr:street"] ? tags["addr:street"] : "Address not available";

                    L.circleMarker([lat, lon], createCircleMarker('#008000'))
                        .addTo(map)
                        .bindPopup(`<b>${amenityName}</b><br>${address}`);

                    bounds.extend([lat, lon]);
                });

                map.fitBounds(bounds, { padding: [20, 20], maxZoom: map.getZoom() });
            })
            .catch(err => console.error('Error fetching data:', err));
    </script>
</body>
</html>
