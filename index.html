<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Amenities</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amenity = urlParams.get('amenity');
        const lat = parseFloat(urlParams.get('lat'));
        const lon = parseFloat(urlParams.get('lon'));
        const radius = parseInt(urlParams.get('radius'));

        const map = L.map('map').setView([lat, lon], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Blue marker for user's location
        L.marker([lat, lon], { title: "Your Location" }).addTo(map)
            .bindPopup("You are here").openPopup();

        // Fetch amenities from Overpass API
        const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="${amenity}"](around:${radius},${lat},${lon});out;`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(element => {
                    const { lat, lon, tags } = element;
                    L.marker([lat, lon], { icon: new L.Icon({
                        iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
                        iconSize: [32, 32],
                        iconAnchor: [16, 32]
                    })}).addTo(map)
                    .bindPopup(`${tags.name || "Unnamed"} (${amenity})`);
                });
            })
            .catch(err => console.error('Error fetching data:', err));
    </script>
</body>
</html>
