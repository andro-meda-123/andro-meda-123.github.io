<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Amenities</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amenity = urlParams.get('amenity');
        const lat = parseFloat(urlParams.get('lat'));
        const lon = parseFloat(urlParams.get('lon'));
        const radius = parseInt(urlParams.get('radius'));

        const map = L.map('map').setView([lat, lon], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Custom marker icons
        const blueIcon = new L.Icon({
            iconUrl: 'https://chart.googleapis.com/chart?chst=d_map_pin_letter&chld=|20209F|ffffff',
            iconSize: [32, 32],
            iconAnchor: [16, 32]
        });

        const greenIcon = new L.Icon({
            iconUrl: 'https://chart.googleapis.com/chart?chst=d_map_pin_letter&chld=|008000|ffffff',
            iconSize: [32, 32],
            iconAnchor: [16, 32]
        });

        // Blue marker for user's location
        L.marker([lat, lon], { icon: blueIcon }).addTo(map)
            .bindPopup("<b>Reference Location</b>").openPopup();

        // Fetch amenities from Overpass API
        const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="${amenity}"](around:${radius},${lat},${lon});out;`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(element => {
                    const { lat, lon, tags } = element;
                    L.marker([lat, lon], { icon: greenIcon }).addTo(map)
                    .bindPopup(`<b>${tags.name || "Unnamed"}</b>`);
                });
            })
            .catch(err => console.error('Error fetching data:', err));
    </script>
</body>
</html>
